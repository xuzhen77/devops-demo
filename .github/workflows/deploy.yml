# .github/workflows/deploy.yml
name: CI/CD Pipeline to GHCR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # 关键：授予向 GitHub 仓库写入包的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest test_app.py -v

      # ===== 修改开始：推送镜像到 GHCR =====
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # 使用我们刚配置的 GHCR_PAT 替代之前用的 DOCKERHUB_TOKEN
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 修改镜像标签地址为 ghcr.io/[你的GitHub用户名]/se-web-app
          tags: |
            ghcr.io/${{ github.repository_owner }}/se-web-app:latest
            ghcr.io/${{ github.repository_owner }}/se-web-app:${{ github.sha }}
